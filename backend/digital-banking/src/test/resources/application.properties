# ── Test overrides ────────────────────────────────────────────────────────────
# Les tests utilisent H2 en mémoire pour une isolation complète.
# Ces valeurs écrasent celles de src/main/resources/application.properties.

# H2 in-memory — isolation complète, jamais de fichier sur disque
spring.datasource.url=jdbc:h2:mem:test-db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT (identique à dev — non secret, juste pour les tests)
jwt.secret-key=9faSDFJKjkasdf09823jksdf90sdjkfsdf09823jksdfasdfasdf

# Telegram (bot non démarré dans les tests)
telegram.bot.token=test-dummy-token
telegram.bot.username=test-dummy-bot

# Spring AI OpenAI (pas de vraies requêtes HTTP dans les tests unitaires)
spring.ai.openai.api-key=test-dummy-key
