spring.application.name=digital-banking
server.port=8086

# ── MySQL ─────────────────────────────────────────────────────────────────────
# Remplacez les valeurs par défaut si votre MySQL a un mot de passe.
# Variables d'environnement supportées : MYSQL_HOST, MYSQL_PORT, MYSQL_DB,
#                                        MYSQL_USER, MYSQL_PASSWORD
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:banque}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Mimmo@3206}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optimisations MySQL — évite les avertissements de dépreciation Hibernate 6
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SpringDoc / Swagger
springdoc.api-docs.version=openapi_3_0

